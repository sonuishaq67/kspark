version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: interview-coach-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # SQLite file persists outside container
      - ./prompts:/app/prompts    # prompt templates hot-reloadable
      - ./config:/app/config      # persona/company YAML configs
      - ./database/seed_data:/app/seed_data    # demo questions
    env_file:
      - .env
    environment:
      - SQLITE_PATH=/app/data/interview_coach.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: interview-coach-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes: {}
