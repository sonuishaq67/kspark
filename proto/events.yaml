# Event Type Definitions
# All internal event types used across services

events:
  # Session lifecycle (P2 emits, P3 consumes)
  session.started:
    fields:
      session_id: uuid
      user_id: uuid
      mode: string  # learning | professional
      persona_id: string
      company_profile_id: string
      started_at: timestamp
  
  session.completed:
    fields:
      session_id: uuid
      user_id: uuid
      mode: string
      duration_seconds: int
      content_score: float  # 0-100
      per_topic_outcomes: object  # {topic_id: {closed_first_probe: bool, probes_used: int}}
      difficulty_snapshot: object  # {topic_id: difficulty_level}
      ended_at: timestamp
  
  # Progression events (P3 emits)
  xp.awarded:
    fields:
      user_id: uuid
      session_id: uuid
      xp_amount: int
      breakdown: object  # {base, quality, difficulty, streak_bonus}
      awarded_at: timestamp
  
  level.up:
    fields:
      user_id: uuid
      old_level: int
      new_level: int
      unlocked_features: array  # [feature_id, ...]
      leveled_up_at: timestamp
  
  achievement.earned:
    fields:
      user_id: uuid
      achievement_id: string
      earned_at: timestamp
  
  difficulty.changed:
    fields:
      user_id: uuid
      topic_id: string
      old_difficulty: int
      new_difficulty: int
      reason: string  # success | struggle
      changed_at: timestamp

  # Progression aggregate (P3 emits, P2 consumes for report attachment — design §2.14 step 8)
  progression.updated:
    fields:
      user_id: uuid
      session_id: uuid
      xp_breakdown: object  # {base, quality, difficulty, streak_bonus, total}
      level_up: object  # nullable: {old_level, new_level, unlocked_features}
      new_achievements: array  # [achievement_id, ...]
      difficulty_deltas: array  # [{topic_id, old, new, reason}, ...]
      updated_at: timestamp
  
  # Research events (P1 emits)
  research.completed:
    fields:
      company_name: string
      profile_id: string  # custom-{slug}-{timestamp}
      brief: object
      completed_at: timestamp
  
  research.failed:
    fields:
      company_name: string
      error: string
      failed_at: timestamp
  
  # Coding events (P3 emits)
  coding.submitted:
    fields:
      session_id: uuid
      user_id: uuid
      question_id: string
      code: string
      language: string
      test_results: object
      submitted_at: timestamp
  
  # Scaffolding events (P2 emits)
  scaffolding.refused:
    fields:
      session_id: uuid
      user_id: uuid
      turn_id: uuid
      user_utterance: string
      mode: string
      refused_at: timestamp
  
  # Turn signals (P2 emits, used internally)
  turn.completed:
    fields:
      session_id: uuid
      turn_id: uuid
      transcript: string
      classification: string  # complete | partial | clarify | stall
      prosody: object  # {wpm, filler_rate, longest_pause, pitch_range}
      emotion: object  # {confidence, hesitation} (nullable if Hume unavailable)
      completed_at: timestamp
